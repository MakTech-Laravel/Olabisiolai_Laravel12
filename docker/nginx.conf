# =============================================================================
# Reverb + HTTPS (Coolify / Traefik / any TLS terminator)
# =============================================================================
# Browsers connect with wss://API_HOST/app/KEY on port 443 (same host as REST).
# TLS terminates at the edge; traffic reaches THIS nginx on :80 inside the container.
# These location blocks forward /app, /apps, /reverb → Reverb on 127.0.0.1:8089.
# Do NOT publish 8089 on Coolify. Do NOT point the SPA at ws://…:8089.
# Host-level /etc/nginx (VPS) is unused when you run this image — config lives here.
# =============================================================================
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    # Internal Reverb (supervisor). Public WebSocket is nginx :80 → this upstream.
    upstream reverb_internal {
        server 127.0.0.1:8089;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    map $http_x_forwarded_proto $reverb_forwarded_proto {
        ''      $scheme;
        default $http_x_forwarded_proto;
    }

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 500M;
    client_body_timeout 300s;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    server {
        listen 80;
        server_name _;

        root /var/www/public;
        index index.php index.html;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        real_ip_header X-Forwarded-For;
        set_real_ip_from 10.0.0.0/8;
        set_real_ip_from 172.16.0.0/12;
        set_real_ip_from 192.168.0.0/16;
        real_ip_recursive on;

        # Public disk only (storage/app/public). Messaging attachments live in app/private
        # and are served by Laravel signed routes — do not intercept those requests here.
        location ^~ /storage/ {
            if ($arg_signature != "") {
                rewrite ^ /index.php?$query_string last;
            }
            alias /var/www/storage/app/public/;
            access_log off;
            expires 30d;
            add_header Cache-Control "public";
        }

        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp)$ {
            try_files $uri @fallback;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location @fallback {
            try_files $uri /index.php?$query_string;
        }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
            limit_req zone=general burst=20 nodelay;
        }

        location /api {
            try_files $uri $uri/ /index.php?$query_string;
            limit_req zone=api burst=50 nodelay;
        }

        # Reverb (Pusher): browsers use public port 80 (or edge 443) — not REVERB_SERVER_PORT.
        location ^~ /app {
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_connect_timeout 60s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $reverb_forwarded_proto;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_pass http://reverb_internal;
        }

        location ^~ /apps {
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_connect_timeout 60s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $reverb_forwarded_proto;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_pass http://reverb_internal;
        }

        location ^~ /reverb {
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_connect_timeout 60s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $reverb_forwarded_proto;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_pass http://reverb_internal;
        }

        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
            fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
            fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
            fastcgi_param HTTP_X_FORWARDED_PORT $http_x_forwarded_port;
            fastcgi_read_timeout 300s;
            fastcgi_send_timeout 300s;
            fastcgi_connect_timeout 300s;
            fastcgi_buffer_size 128k;
            fastcgi_buffers 256 16k;
            fastcgi_busy_buffers_size 256k;
            fastcgi_temp_file_write_size 256k;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }

        location ~ /\.ht {
            deny all;
        }

        location /up {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }
}
